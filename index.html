<script>
function getBoardFromUI() {
  let table = document.querySelector("table");
  let board = [];

  for (let i = 0; i < 9; i++) {
    let row = [];
    for (let j = 0; j < 9; j++) {
      let val = table.rows[i].cells[j].firstChild.value;
      row.push(val === "" ? 0 : parseInt(val));
    }
    board.push(row);
  }
  return board;
}

function isValidGroup(arr) {
  let set = new Set(arr);
  return set.size === 9 && !arr.includes(0);
}

function checkSolution() {
  let board = getBoardFromUI();

  for (let i = 0; i < 9; i++) {
    if (!isValidGroup(board[i])) {
      alert("Row " + (i+1) + " incorrect");
      return;
    }
  }

  alert("Correct Sudoku!");
}
</script>
